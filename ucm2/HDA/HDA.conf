Syntax 8

Define.Use "${var:@HDA}"	# a non-empty string to use UCM configuration for HDA devices
Define.Done ""			# a non-empty string to skip the end error

Define.AcpCardId "$${find-card:field=name,return=id,regex='^acp(|6[23x]|-pdm-mach)$'}"
Define.MicType "hda"

If.dualcodec {
	Condition {
		Type String
		Haystack "${CardLongName}"
		Needle "DualCodecs"
	}
	True {
		Define.Done y
		Define.AcpCardId ""
		Include.dual.File "/HDA/DualCodecs/DualCodecs.conf"
	}
}

If.acp {
	Condition {
		Type String
		Empty "${var:AcpCardId}"
	}
	False.If.noacp {
		Condition {
			Type String
			Empty "${var:@NoACP}"
		}
		True {
			Define.Use y
			Define.MicType "acp"
		}
	}
}

If.use {
	Condition {
		Type String
		Empty "${var:Use}"
	}
	False {
		Define.Done y

		SectionUseCase."HiFi" {
			File "/HDA/HiFi.conf"
			Comment "Play HiFi quality Music"
		}

		If.analog {
			Condition {
				Type ControlExists
				Control "name='Master Playback Switch'"
			}
			True {
				Include.init.File "/HDA/init.conf"

				If.acp {
					Condition {
						Type String
						String1 "${var:MicType}"
						String2 "acp"
					}
					True {
						Include.led.File "/common/ctl/led.conf"

						Macro [
							{ CtlNew { Arg="name='Mic ACP LED Capture Switch' type=bool,count=1 off" } }
							{ SetLED { LED="mic" Action="attach" CtlId="Mic ACP LED Capture Switch" } }
							{ SetLED { LED="mic" Action="detach" CtlId="Capture Switch" } }
						]
					}
				}
			}
		}
	}
}

If.err {
	Condition {
		Type String
		Empty "${var:Done}"
	}
	True.Error "UCM is not supported for this HDA model (${CardLongName})"
}
